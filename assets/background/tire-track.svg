<svg xmlns="http://www.w3.org/2000/svg" width="120" height="240" viewBox="0 0 120 240">
  <defs>
    <filter id="mud" x="-10%" y="-5%" width="120%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.07 0.04" numOctaves="4" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Track bed wash — faint muddy contact zone -->
  <rect x="14" y="0" width="92" height="240" fill="#5C4922" opacity="0.055"/>

  <g filter="url(#mud)" fill="#5C4922">

    <!-- === CENTER KNOBS (large blocky) every 24px === -->
    <rect x="45" y="2"   width="30" height="15" rx="3" opacity="0.52"/>
    <rect x="45" y="26"  width="30" height="15" rx="3" opacity="0.46"/>
    <rect x="45" y="50"  width="30" height="15" rx="3" opacity="0.52"/>
    <rect x="45" y="74"  width="30" height="15" rx="3" opacity="0.46"/>
    <rect x="45" y="98"  width="30" height="15" rx="3" opacity="0.52"/>
    <rect x="45" y="122" width="30" height="15" rx="3" opacity="0.46"/>
    <rect x="45" y="146" width="30" height="15" rx="3" opacity="0.52"/>
    <rect x="45" y="170" width="30" height="15" rx="3" opacity="0.46"/>
    <rect x="45" y="194" width="30" height="15" rx="3" opacity="0.52"/>
    <rect x="45" y="218" width="30" height="15" rx="3" opacity="0.46"/>

    <!-- === LEFT INNER KNOBS (offset by 12px) === -->
    <rect x="28" y="14"  width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="28" y="38"  width="20" height="13" rx="3" opacity="0.38"/>
    <rect x="28" y="62"  width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="28" y="86"  width="20" height="13" rx="3" opacity="0.38"/>
    <rect x="28" y="110" width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="28" y="134" width="20" height="13" rx="3" opacity="0.38"/>
    <rect x="28" y="158" width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="28" y="182" width="20" height="13" rx="3" opacity="0.38"/>
    <rect x="28" y="206" width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="28" y="230" width="20" height="13" rx="3" opacity="0.38"/>

    <!-- === RIGHT INNER KNOBS (offset by 12px, mirrored) === -->
    <rect x="72" y="14"  width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="72" y="38"  width="20" height="13" rx="3" opacity="0.38"/>
    <rect x="72" y="62"  width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="72" y="86"  width="20" height="13" rx="3" opacity="0.38"/>
    <rect x="72" y="110" width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="72" y="134" width="20" height="13" rx="3" opacity="0.38"/>
    <rect x="72" y="158" width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="72" y="182" width="20" height="13" rx="3" opacity="0.38"/>
    <rect x="72" y="206" width="20" height="13" rx="3" opacity="0.44"/>
    <rect x="72" y="230" width="20" height="13" rx="3" opacity="0.38"/>

    <!-- === LEFT SHOULDER KNOBS (small, at track edge) === -->
    <rect x="14" y="5"   width="13" height="9"  rx="2" opacity="0.38"/>
    <rect x="14" y="53"  width="13" height="9"  rx="2" opacity="0.32"/>
    <rect x="14" y="101" width="13" height="9"  rx="2" opacity="0.38"/>
    <rect x="14" y="149" width="13" height="9"  rx="2" opacity="0.32"/>
    <rect x="14" y="197" width="13" height="9"  rx="2" opacity="0.38"/>

    <!-- === RIGHT SHOULDER KNOBS (offset by 24px from left) === -->
    <rect x="93" y="29"  width="13" height="9"  rx="2" opacity="0.38"/>
    <rect x="93" y="77"  width="13" height="9"  rx="2" opacity="0.32"/>
    <rect x="93" y="125" width="13" height="9"  rx="2" opacity="0.38"/>
    <rect x="93" y="173" width="13" height="9"  rx="2" opacity="0.32"/>
    <rect x="93" y="221" width="13" height="9"  rx="2" opacity="0.38"/>

  </g>
</svg>
